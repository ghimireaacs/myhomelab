# 1. The Physical Connection (TrueNAS Path)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vikunja-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: ${NFS_SERVER_IP}
    path: ${NFS_VIKUNJA_PATH}
---
# 2. The Logical Claim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vikunja-pvc
  namespace: personal
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: vikunja-pv
  resources:
    requests:
      storage: 5Gi
