apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: personal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z wallabag-postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: wallabag
          image: wallabag/wallabag:latest
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_pgsql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: wallabag-postgres
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "5432"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: postgres-password
            - name: SYMFONY__ENV__MAILER_DSN
              value: "null://null"
            - name: SYMFONY__ENV__FROM_EMAIL
              value: "wallabag@${BASE_DOMAIN}"
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: "https://read.${BASE_DOMAIN}"
            - name: POPULATE_DATABASE
              value: "true"
            - name: TZ
              value: Australia/Sydney
          volumeMounts:
            - name: wallabag-storage
              mountPath: /var/www/html/web/assets/images
              subPath: images
      volumes:
        - name: wallabag-storage
          persistentVolumeClaim:
            claimName: wallabag-pvc
