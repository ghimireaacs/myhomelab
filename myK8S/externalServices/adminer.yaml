apiVersion: v1
kind: Service
metadata:
  name: adminer-service
  namespace: external-infra
spec:
  clusterIP: None
  ports:
    - name: http
      port: 8787
      targetPort: 8787
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: adminer-slice
  namespace: external-infra
  labels:
    kubernetes.io/service-name: adminer-service
addressType: IPv4
ports:
  - name: http
    port: 8787
    protocol: TCP
endpoints:
  - addresses:
      - "${UTILITY_IP}"
    conditions:
      ready: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer-ingress
  namespace: external-infra
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod-cf
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "adminer.${BASE_DOMAIN}"
      secretName: adminer-tls-secret
  rules:
    - host: "adminer.${BASE_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adminer-service
                port:
                  number: 8787
