apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  namespace: personal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniflux
  template:
    metadata:
      labels:
        app: miniflux
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z miniflux-postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: miniflux
          image: miniflux/miniflux:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: database-url
            - name: RUN_MIGRATIONS
              value: "1"
            - name: CREATE_ADMIN
              value: "1"
            - name: ADMIN_USERNAME
              value: admin
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miniflux-secrets
                  key: admin-password
            - name: BASE_URL
              value: "https://rss.${BASE_DOMAIN}"
            - name: TZ
              value: Australia/Sydney
