apiVersion: v1
kind: ConfigMap
metadata:
  name: glance-config
  namespace: personal
data:
  glance.yml: |
    # content of your glance.yml
    server:
      assets-path: /app/assets

    theme:
      # Note: assets are cached by the browser, changes to the CSS file
      # will not be reflected until the browser cache is cleared (Ctrl+F5)
      custom-css-file: /assets/user.css

    pages:
      # It's not necessary to create a new file for each page and include it, you can simply
      # put its contents here, though multiple pages are easier to manage when separated
      - $include: home.yml
  home.yml: |
      - name: Home
        hide-desktop-navigation: false
        columns:

          # LEFT — quick links, calendar, weather
          - size: small
            widgets:
              - type: bookmarks
                groups:
                  - title: Homelab
                    links:
                      - title: Homepage
                        url: https://home.560384.xyz
                      - title: Grafana
                        url: https://grafana.560384.xyz
                      - title: Portainer
                        url: https://portainer.560384.xyz
                      - title: Semaphore
                        url: https://ansible.560384.xyz
                      - title: ntfy
                        url: https://ntfy.560384.xyz
                      - title: Proxmox
                        url: https://proxmox.560384.xyz
                  - title: Blog & Docs
                    links:
                      - title: Blog
                        url: https://ashishghimire.com
                      - title: Umami
                        url: https://umami.ashishghimire.com
                      - title: Wiki
                        url: https://wiki.ashishghimire.com

              - type: calendar
                first-day-of-week: monday

              - type: weather
                location: Sydney, Australia
                units: metric
                hour-format: 12h

          # CENTRE — content feed
          - size: full
            widgets:
              - type: videos
                channels:
                  - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
                  - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
                  - UCsBjURrPoezykLs9EqgamOA # Fireship
                  - UCBJycsmduvYEL83R_U4JriQ # Marques Brownlee
                  - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium

              - type: group
                widgets:
                  - type: hacker-news
                  - type: lobsters

              - type: group
                widgets:
                  - type: reddit
                    subreddit: selfhosted
                    show-thumbnails: true
                  - type: reddit
                    subreddit: technology
                    show-thumbnails: true

          # RIGHT — markets, releases, rss, twitch
          - size: small
            widgets:
              - type: markets
                markets:
                  - symbol: SPY
                    name: S&P 500
                  - symbol: BTC-USD
                    name: Bitcoin
                  - symbol: NVDA
                    name: NVIDIA
                  - symbol: AAPL
                    name: Apple
                  - symbol: MSFT
                    name: Microsoft

              - type: releases
                cache: 1d
                repositories:
                  - glanceapp/glance
                  - immich-app/immich
                  - syncthing/syncthing
                  - umami-software/umami
                  - semaphoreui/semaphore

              - type: rss
                limit: 10
                collapse-after: 3
                cache: 12h
                feeds:
                  - url: https://selfh.st/rss/
                    title: selfh.st
                  - url: https://ciechanow.ski/atom.xml
                  - url: https://www.joshwcomeau.com/rss.xml
                    title: Josh Comeau
                  - url: https://samwho.dev/rss.xml
                  - url: https://ishadeed.com/feed.xml
                    title: Ahmad Shadeed

              - type: twitch-channels
                channels:
                  - theprimeagen
                  - j_blow
                  - giantwaffle
                  - cohhcarnage
                  - christitustech
                  - EJ_SA
