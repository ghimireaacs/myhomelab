apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: root-url
            # Authentik OAuth
            - name: AUTHENTIK_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: oauth-base-url
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Authentik"
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid email profile"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "$(AUTHENTIK_BASE_URL)/application/o/authorize/"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "$(AUTHENTIK_BASE_URL)/application/o/token/"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "$(AUTHENTIK_BASE_URL)/application/o/userinfo/"
            - name: GF_AUTH_SIGNOUT_REDIRECT_URL
              value: "$(AUTHENTIK_BASE_URL)/application/o/grafana/end-session/"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups, 'authentik Admins') && 'Admin' || contains(groups, 'grafana-admins') && 'Admin' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: oauth-client-id
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: oauth-client-secret
            - name: NTFY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: ntfy-admin-token
                  optional: true
            - name: NTFY_IP
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: ntfy-ip
                  optional: true
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-homelab
              mountPath: /etc/grafana/dashboards/homelab
            - name: grafana-dashboard-opnsense
              mountPath: /etc/grafana/dashboards/opnsense
            - name: grafana-alerting
              mountPath: /etc/grafana/provisioning/alerting
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard-homelab
          configMap:
            name: grafana-dashboard-homelab
        - name: grafana-dashboard-opnsense
          configMap:
            name: grafana-dashboard-opnsense
        - name: grafana-alerting
          configMap:
            name: grafana-alerting
