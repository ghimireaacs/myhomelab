apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: infra
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.infra.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: opnsense
        static_configs:
          - targets:
              - localhost
            labels:
              job: opnsense
              source: firewall
              __path__: /var/log/opnsense/*.log
        pipeline_stages:
          - regex:
              expression: 'filterlog\[\d+\]: (?:[^,]*,){4}(?P<iface>[^,]+),(?:[^,]+),(?P<action>block|pass|reject),(?P<dir>in|out),(?P<ipver>4|6)(?:(?:,[^,]*){7},(?P<proto>[^,]+))?'
          - labels:
              action:
              dir:
              iface:
              proto:
