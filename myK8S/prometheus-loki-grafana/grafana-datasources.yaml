apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: infra
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        editable: false
