services:
  rxresume-browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: rxresume-browserless
    restart: unless-stopped
    environment:
      - QUEUED=5
      - HEALTH=true
      - CONCURRENT=3
      - TOKEN=${BROWSERLESS_TOKEN}
    networks:
      - rxresume_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure?token=${BROWSERLESS_TOKEN}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rxresume:
    image: amruthpillai/reactive-resume:latest
    container_name: rxresume
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - TZ=Australia/Sydney
      - NODE_ENV=production
      - APP_URL=${APP_URL}
      - PRINTER_APP_URL=http://rxresume:3000
      - PRINTER_ENDPOINT=ws://rxresume-browserless:3000?token=${BROWSERLESS_TOKEN}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/rxresume
      - AUTH_SECRET=${AUTH_SECRET}
      - FLAG_DISABLE_SIGNUPS=false
    volumes:
      - ${RXRESUME_DATA_PATH}:/app/data
    depends_on:
      rxresume-browserless:
        condition: service_healthy
    networks:
      - db_shared
      - rxresume_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  db_shared:
    external: true
  rxresume_internal:
    driver: bridge
